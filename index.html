<!DOCTYPE html>
<html lang="ar" dir="auto">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>OpenCode Go Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
  background: #0f0f0f;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
}
.header {
  background: #1a1a2e;
  padding: 14px 16px;
  text-align: center;
  border-bottom: 1px solid #2a2a4a;
}
.header h1 { font-size: 18px; color: #fff; margin-bottom: 4px; }
.header span { font-size: 12px; color: #888; }
.chat-box {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.msg {
  max-width: 85%;
  padding: 10px 14px;
  border-radius: 16px;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.user { background: #2b2b5e; align-self: flex-end; border-bottom-right-radius: 4px; }
.bot { background: #1e1e2e; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #2a2a4a; }
.typing { color: #888; font-style: italic; }
.tokens { font-size: 11px; color: #666; margin-top: 4px; text-align: right; }
.input-bar {
  display: flex;
  padding: 12px;
  gap: 8px;
  background: #1a1a2e;
  border-top: 1px solid #2a2a4a;
  position: sticky;
  bottom: 0;
}
.input-bar input {
  flex: 1;
  padding: 12px 16px;
  border: 1px solid #333;
  border-radius: 24px;
  background: #141414;
  color: #e0e0e0;
  font-size: 15px;
  outline: none;
}
.input-bar input:focus { border-color: #5555cc; }
.input-bar button {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  border: none;
  background: #5555cc;
  color: #fff;
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
.input-bar button:active { background: #4444bb; }
.settings {
  background: #1a1a2e;
  padding: 12px 16px;
  border-top: 1px solid #2a2a4a;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.settings input {
  flex: 1;
  min-width: 120px;
  padding: 8px 12px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #141414;
  color: #e0e0e0;
  font-size: 13px;
  outline: none;
}
.settings label { font-size: 12px; color: #888; }
.settings select {
  padding: 8px 12px;
  border: 1px solid #333;
  border-radius: 8px;
  background: #141414;
  color: #e0e0e0;
  font-size: 13px;
  outline: none;
}
#toggleSettings {
  background: none;
  border: 1px solid #333;
  color: #888;
  padding: 6px 12px;
  border-radius: 8px;
  font-size: 12px;
  cursor: pointer;
}
#toggleSettings:hover { border-color: #5555cc; color: #fff; }
.hidden { display: none !important; }
pre { background: #0a0a0a; padding: 8px; border-radius: 8px; overflow-x: auto; font-size: 13px; margin: 4px 0; }
code { font-family: 'Consolas', 'Monaco', monospace; }
</style>
</head>
<body>

<div class="header">
  <h1>💬 OpenCode Go Chat</h1>
  <span id="statusModel">deepseek-v4-flash</span>
</div>

<div class="settings hidden" id="settingsPanel">
  <label>API Key:</label>
  <input type="password" id="apiKeyInput" placeholder="ocgo_..." value="">
  <label>Model:</label>
  <select id="modelSelect">
    <option value="deepseek-v4-flash">deepseek-v4-flash</option>
    <option value="deepseek-v4-pro">deepseek-v4-pro</option>
    <option value="kimi-k2.6">kimi-k2.6</option>
    <option value="kimi-k2.5">kimi-k2.5</option>
    <option value="glm-5.1">glm-5.1</option>
    <option value="glm-5">glm-5</option>
    <option value="minimax-m3">minimax-m3</option>
    <option value="minimax-m2.7">minimax-m2.7</option>
    <option value="mimo-v2.5">mimo-v2.5</option>
    <option value="mimo-v2.5-pro">mimo-v2.5-pro</option>
    <option value="qwen3.7-max">qwen3.7-max</option>
    <option value="qwen3.7-plus">qwen3.7-plus</option>
  </select>
  <button id="saveSettings" style="background:#5555cc;border:none;color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;">حفظ</button>
</div>

<div class="chat-box" id="chatBox">
  <div class="msg bot">👋 مرحباً! أكتب حاجة وأنا أرد عليك.<br>اضغط على ⚙️ عشان تضبط API Key والموديل.</div>
</div>

<div class="input-bar">
  <input id="userInput" type="text" placeholder="اكتب رسالة..." autocomplete="off">
  <button id="toggleSettings" style="width:40px;height:40px;border-radius:50%;border:1px solid #333;background:transparent;color:#888;font-size:18px;cursor:pointer;">⚙️</button>
  <button id="sendBtn">➤</button>
</div>

<script>
const API_BASE = 'https://opencode.ai/zen/go/v1';
let apiKey = localStorage.getItem('ocgo_key') || '';
let model = localStorage.getItem('ocgo_model') || 'deepseek-v4-flash';

const chatBox = document.getElementById('chatBox');
const userInput = document.getElementById('userInput');
const sendBtn = document.getElementById('sendBtn');
const apiKeyInput = document.getElementById('apiKeyInput');
const modelSelect = document.getElementById('modelSelect');
const statusModel = document.getElementById('statusModel');
const settingsPanel = document.getElementById('settingsPanel');
const toggleBtn = document.getElementById('toggleSettings');

if (apiKey) apiKeyInput.value = apiKey;
modelSelect.value = model;
statusModel.textContent = model;

toggleBtn.onclick = () => settingsPanel.classList.toggle('hidden');

document.getElementById('saveSettings').onclick = () => {
  apiKey = apiKeyInput.value.trim();
  model = modelSelect.value;
  localStorage.setItem('ocgo_key', apiKey);
  localStorage.setItem('ocgo_model', model);
  statusModel.textContent = model;
  settingsPanel.classList.add('hidden');
  addMsg('bot', `✅ تم الحفظ. الموديل: ${model}`);
};

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = text.replace(/\n/g, '<br>');
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'msg bot typing';
  div.id = 'typing';
  div.textContent = '...';
  chatBox.appendChild(div);
  chatBox.scrollTop = chatBox.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

async function sendMessage() {
  const msg = userInput.value.trim();
  if (!msg) return;
  if (!apiKey) { addMsg('bot', '⚠️ دخل API Key الأول من ⚙️'); return; }

  userInput.value = '';
  addMsg('user', msg);
  showTyping();

  try {
    const res = await fetch(`${API_BASE}/chat/completions`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${apiKey}`
      },
      body: JSON.stringify({
        model: model,
        messages: [
          { role: 'system', content: 'You are a helpful assistant. Respond in the same language the user writes in.' },
          { role: 'user', content: msg }
        ],
        max_tokens: 4096,
        stream: false
      })
    });

    const data = await res.json();

    if (data.error) {
      removeTyping();
      addMsg('bot', `❌ ${data.error.message || 'حدث خطأ'}`);
      return;
    }

    const reply = data.choices?.[0]?.message?.content || '⚠️ مفيش رد';
    const tokens = data.usage?.total_tokens || 0;

    removeTyping();

    const div = document.createElement('div');
    div.className = 'msg bot';
    div.innerHTML = reply.replace(/\n/g, '<br>');
    chatBox.appendChild(div);

    const tokDiv = document.createElement('div');
    tokDiv.className = 'tokens';
    tokDiv.textContent = `🔤 ${tokens} tokens`;
    chatBox.appendChild(tokDiv);

    chatBox.scrollTop = chatBox.scrollHeight;

  } catch (err) {
    removeTyping();
    addMsg('bot', `❌ خطأ: ${err.message}`);
  }
}

sendBtn.onclick = sendMessage;
userInput.onkeydown = (e) => { if (e.key === 'Enter') sendMessage(); };
</script>

</body>
</html>
